<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Satelital Argentina</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e6e8ea; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: #161b22; border-bottom: 1px solid #2a313a; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; z-index: 1001; }
  header h1 { font-size: 17px; font-weight: 600; }
  header h1 span { color: #4ade80; }
  #fecha-info { font-size: 12.5px; color: #9aa4af; }
  #contenedor { flex: 1; display: flex; min-height: 0; }
  #panel { width: 270px; background: #161b22; border-right: 1px solid #2a313a; padding: 16px; overflow-y: auto; flex-shrink: 0; }
  #panel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #9aa4af; margin: 16px 0 8px; }
  #panel h2:first-child { margin-top: 0; }
  .capa-btn { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; background: transparent; border: 1px solid transparent; color: #cfd6dd; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13.5px; margin-bottom: 3px; }
  .capa-btn:hover { background: #1e2630; }
  .capa-btn.activa { background: #1a2f24; border-color: #2f6b47; color: #7ee2a8; }
  .capa-btn .punto { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .control-fila { margin: 10px 0; }
  .control-fila label { font-size: 12.5px; color: #9aa4af; display: flex; justify-content: space-between; margin-bottom: 5px; }
  .control-fila input[type="date"], .control-fila select { width: 100%; background: #0f1419; color: #e6e8ea; border: 1px solid #2a313a; border-radius: 8px; padding: 7px 9px; font-size: 13px; }
  input[type="range"] { width: 100%; accent-color: #4ade80; }
  .check-fila { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #cfd6dd; margin: 8px 0; cursor: pointer; }
  .check-fila input { accent-color: #4ade80; }
  .boton-accion { width: 100%; background: #1a2f24; border: 1px solid #2f6b47; color: #7ee2a8; padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13.5px; margin-top: 4px; }
  .boton-accion:hover { background: #22402f; }
  #estado-serie { font-size: 12px; color: #9aa4af; margin-top: 8px; min-height: 16px; }
  #leyenda { margin-top: 14px; }
  #leyenda-barra { height: 12px; border-radius: 6px; margin: 6px 0 4px; }
  #leyenda-rangos { display: flex; justify-content: space-between; font-size: 11.5px; color: #9aa4af; }
  #leyenda-titulo { font-size: 12.5px; color: #cfd6dd; }
  #leyenda-rango { font-size: 11.5px; color: #6b7480; margin-top: 4px; }
  #mapa { position: absolute; inset: 0; background: #0a0e12; }
  #aviso { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: #2a1f0e; border: 1px solid #6b5320; color: #fbbf24; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 2000; max-width: 90%; text-align: center; display: none; }
  #info-depto { position: absolute; bottom: 16px; right: 16px; background: rgba(22,27,34,.94); border: 1px solid #2a313a; border-radius: 10px; padding: 10px 14px; font-size: 13px; z-index: 1000; display: none; max-width: 240px; }
  #info-depto b { color: #7ee2a8; }
  #panel-grafico { display: none; position: absolute; left: 50%; transform: translateX(-50%); bottom: 18px; width: min(760px, 92%); background: rgba(22,27,34,.97); border: 1px solid #2a313a; border-radius: 12px; padding: 12px 14px 16px; z-index: 1500; }
  #grafico-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  #grafico-titulo { font-size: 13px; color: #cfd6dd; }
  #cerrar-grafico { background: transparent; border: none; color: #9aa4af; font-size: 18px; cursor: pointer; }
  #grafico-wrap { position: relative; height: 220px; }
  footer { background: #161b22; border-top: 1px solid #2a313a; padding: 6px 20px; font-size: 11.5px; color: #6b7480; }
  @media (max-width: 720px) {
    #contenedor { flex-direction: column; }
    #panel { width: 100%; max-height: 42vh; border-right: none; border-bottom: 1px solid #2a313a; }
  }
  .leaflet-container { background: #0a0e12; }
</style>
</head>
<body>
<header>
  <h1>Monitor Satelital <span>Argentina</span></h1>
  <div id="fecha-info">Cargando datos...</div>
</header>
<div id="contenedor">
  <aside id="panel">
    <h2>Indices de vegetacion</h2>
    <div id="grupo-indices"></div>
    <h2>Agua y humedad</h2>
    <div id="grupo-agua"></div>
    <h2>Precipitaciones</h2>
    <div id="grupo-lluvia"></div>
    <h2>Controles</h2>
    <div class="control-fila">
      <label>Opacidad de la capa <span id="opacidad-valor">80%</span></label>
      <input type="range" id="opacidad" min="10" max="100" value="80">
    </div>
    <label class="check-fila">
      <input type="checkbox" id="toggle-deptos"> Limites de departamentos
    </label>
    <div id="leyenda">
      <div id="leyenda-titulo">-</div>
      <div id="leyenda-barra"></div>
      <div id="leyenda-rangos"><span id="ley-min"></span><span id="ley-max"></span></div>
      <div id="leyenda-rango"></div>
    </div>
    <h2>Analisis de lote</h2>
    <div class="control-fila"><label>Desde</label><input type="date" id="fecha-inicio"></div>
    <div class="control-fila"><label>Hasta</label><input type="date" id="fecha-fin"></div>
    <div class="control-fila"><label>Variable</label>
      <select id="indice-serie">
        <option value="NDVI">NDVI (optico, sin nubes)</option>
        <option value="EVI">EVI (optico, sin nubes)</option>
        <option value="NDWI">NDWI (optico, sin nubes)</option>
        <option value="NDMI">NDMI (optico, sin nubes)</option>
        <option value="RVI">RVI (radar Sentinel-1)</option>
        <option value="TEMP">Temperatura media (ERA5)</option>
      </select>
    </div>
    <button id="btn-dibujar" class="boton-accion">Dibujar lote y graficar</button>
    <div id="estado-serie"></div>
    <h2>Tiempo real GOES</h2>
    <button id="btn-goes" class="boton-accion">Cargar ultima imagen GOES</button>
    <div id="grupo-goes" style="margin-top:6px;"></div>
    <div id="estado-goes" style="font-size:12px;color:#9aa4af;margin-top:6px;min-height:16px;"></div>
  </aside>
  <div style="flex:1; position:relative; min-height:0;">
    <div id="mapa"></div>
    <div id="aviso"></div>
    <div id="info-depto"></div>
    <div id="panel-grafico">
      <div id="grafico-header"><span id="grafico-titulo"></span><button id="cerrar-grafico">&times;</button></div>
      <div id="grafico-wrap"><canvas id="grafico"></canvas></div>
    </div>
  </div>
</div>
<footer>Datos: Sentinel-1, Sentinel-2, MODIS, CHIRPS, ERA5-Land via Google Earth Engine - Cada capa declara su rango de fechas</footer>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const CAPAS = {
  NDVI_s2:       { nombre: "NDVI (Sentinel-2)",  grupo: "grupo-indices", color: "#22c55e", min: -0.2, max: 0.9,  grad: "linear-gradient(90deg,#a50026,#ffffbf,#006837)", unidad: "" },
  EVI_s2:        { nombre: "EVI (Sentinel-2)",   grupo: "grupo-indices", color: "#84cc16", min: 0,    max: 0.8,  grad: "linear-gradient(90deg,#ffffcc,#41ab5d,#005a32)", unidad: "" },
  NDVI_modis:    { nombre: "NDVI (MODIS)",       grupo: "grupo-indices", color: "#16a34a", min: -0.2, max: 0.9,  grad: "linear-gradient(90deg,#a50026,#ffffbf,#006837)", unidad: "" },
  NDWI_s2:       { nombre: "NDWI (Sentinel-2)",  grupo: "grupo-agua",    color: "#38bdf8", min: -0.5, max: 0.5,  grad: "linear-gradient(90deg,#8c510a,#f5f5f5,#01665e)", unidad: "" },
  MNDWI_s2:      { nombre: "MNDWI (Sentinel-2)", grupo: "grupo-agua",    color: "#0ea5e9", min: -0.5, max: 0.5,  grad: "linear-gradient(90deg,#8c510a,#f5f5f5,#0571b0)", unidad: "" },
  lluvia_chirps: { nombre: "Lluvia CHIRPS",      grupo: "grupo-lluvia",  color: "#3b82f6", min: 0,    max: 300,  grad: "linear-gradient(90deg,#ffffff,#4292c6,#08306b)", unidad: " mm" },
  lluvia_era5:   { nombre: "Lluvia ERA5-Land",   grupo: "grupo-lluvia",  color: "#6366f1", min: 0,    max: 300,  grad: "linear-gradient(90deg,#ffffff,#4292c6,#08306b)", unidad: " mm" },
};
const mapa = L.map("mapa", { zoomControl: true }).setView([-38.5, -64.5], 4);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: "&copy; OpenStreetMap &copy; CARTO", maxZoom: 18,
}).addTo(mapa);
let capaActiva = null, claveActiva = null, tilesConfig = null, capaDeptos = null;
let capaLote = null, chartSerie = null;
async function cargarConfig() {
  try {
    const r = await fetch("tiles.json", { cache: "no-store" });
    if (!r.ok) throw new Error("no encontrado");
    tilesConfig = await r.json();
    document.getElementById("fecha-info").textContent =
      "Actualizado: " + tilesConfig.fecha + " - cada capa declara sus fechas";
  } catch (e) {
    tilesConfig = { tiles: {} };
    document.getElementById("fecha-info").textContent = "Sin datos cargados";
    mostrarAviso("No se encontro tiles.json - el mapa base funciona, pero faltan las capas satelitales.");
  }
  construirBotones();
}
function mostrarAviso(txt) {
  const a = document.getElementById("aviso");
  a.textContent = txt; a.style.display = "block";
  setTimeout(() => (a.style.display = "none"), 9000);
}
function construirBotones() {
  for (const [clave, cfg] of Object.entries(CAPAS)) {
    const btn = document.createElement("button");
    btn.className = "capa-btn"; btn.id = "btn-" + clave;
    btn.innerHTML = '<span class="punto" style="background:' + cfg.color + '"></span>' + cfg.nombre;
    btn.onclick = () => activarCapa(clave);
    document.getElementById(cfg.grupo).appendChild(btn);
  }
  const primera = Object.keys(CAPAS).find(k => tilesConfig.tiles[k]);
  if (primera) activarCapa(primera);
}
function activarCapa(clave) {
  const cfg = CAPAS[clave];
  const url = tilesConfig.tiles[clave];
  if (!url) { mostrarAviso('La capa "' + cfg.nombre + '" no esta en tiles.json todavia.'); return; }
  if (capaActiva) mapa.removeLayer(capaActiva);
  document.querySelectorAll(".capa-btn").forEach(b => b.classList.remove("activa"));
  document.getElementById("btn-" + clave).classList.add("activa");
  const op = document.getElementById("opacidad").value / 100;
  capaActiva = L.tileLayer(url, { opacity: op, maxZoom: 14 }).addTo(mapa);
  claveActiva = clave;
  document.getElementById("leyenda-titulo").textContent = cfg.nombre;
  document.getElementById("leyenda-barra").style.background = cfg.grad;
  document.getElementById("ley-min").textContent = cfg.min + cfg.unidad;
  document.getElementById("ley-max").textContent = cfg.max + cfg.unidad;
  const rango = tilesConfig.rangos && tilesConfig.rangos[clave];
  document.getElementById("leyenda-rango").textContent = rango ? ("Imagenes del " + rango) : "";
}
document.getElementById("opacidad").addEventListener("input", e => {
  document.getElementById("opacidad-valor").textContent = e.target.value + "%";
  if (capaActiva) capaActiva.setOpacity(e.target.value / 100);
});
document.getElementById("toggle-deptos").addEventListener("change", async e => {
  if (e.target.checked) {
    if (!capaDeptos) {
      try {
        const r = await fetch("departamentos.geojson");
        if (!r.ok) throw new Error();
        const gj = await r.json();
        capaDeptos = L.geoJSON(gj, {
          filter: f => f.geometry && String(f.geometry.type).includes("Polygon"),
          style: { color: "#94a3b8", weight: 0.7, fillOpacity: 0, opacity: 0.6 },
          onEachFeature: (f, layer) => {
            layer.on("mouseover", () => {
              const nombre = f.properties.ADM2_NAME || f.properties.nam || "Departamento";
              const prov = f.properties.ADM1_NAME || "";
              const info = document.getElementById("info-depto");
              info.innerHTML = "<b>" + nombre + "</b>" + (prov ? "<br>" + prov : "");
              info.style.display = "block";
              layer.setStyle({ color: "#4ade80", weight: 1.5 });
            });
            layer.on("mouseout", () => {
              document.getElementById("info-depto").style.display = "none";
              capaDeptos.resetStyle(layer);
            });
          },
        });
      } catch {
        mostrarAviso("No se pudo cargar departamentos.geojson.");
        e.target.checked = false; return;
      }
    }
    capaDeptos.addTo(mapa);
  } else if (capaDeptos) { mapa.removeLayer(capaDeptos); }
});
// ---------- Analisis de lote: dibujo + serie temporal ----------
const hoyd = new Date();
const hace6 = new Date(); hace6.setMonth(hace6.getMonth() - 6);
document.getElementById("fecha-fin").value = hoyd.toISOString().slice(0, 10);
document.getElementById("fecha-inicio").value = hace6.toISOString().slice(0, 10);
function estado(t) { document.getElementById("estado-serie").textContent = t; }
document.getElementById("btn-dibujar").addEventListener("click", function () {
  if (capaLote) { mapa.removeLayer(capaLote); capaLote = null; }
  estado("Dibuja el lote: clic por vertice, clic en el primer punto para cerrar.");
  new L.Draw.Polygon(mapa, { shapeOptions: { color: "#4ade80", weight: 2 } }).enable();
});
mapa.on(L.Draw.Event.CREATED, function (e) {
  capaLote = e.layer.addTo(mapa);
  pedirSerie(e.layer.toGeoJSON().geometry);
});
async function pedirSerie(geom) {
  const ind = document.getElementById("indice-serie").value;
  estado("Consultando Earth Engine... puede tardar 10-30 segundos.");
  try {
    const r = await fetch("/.netlify/functions/serie", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ geometry: geom, indice: ind,
        inicio: document.getElementById("fecha-inicio").value,
        fin: document.getElementById("fecha-fin").value }),
    });
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || ("error " + r.status));
    if (!d.puntos || !d.puntos.length) { estado("Sin imagenes validas (sin nubes) en ese rango."); return; }
    dibujarGrafico(ind, d.puntos);
    estado("Listo: " + d.puntos.length + " fechas con datos.");
  } catch (err) { estado("Error: " + err.message); }
}
function dibujarGrafico(ind, puntos) {
  document.getElementById("panel-grafico").style.display = "block";
  const nota = ind === "RVI" ? " (radar, sin problema de nubes)" : ind === "TEMP" ? " (grados C)" : " (solo imagenes sin nubes)";
  document.getElementById("grafico-titulo").textContent = ind + " del lote" + nota;
  if (chartSerie) chartSerie.destroy();
  chartSerie = new Chart(document.getElementById("grafico"), {
    type: "line",
    data: { labels: puntos.map(p => p.fecha),
      datasets: [{ label: ind, data: puntos.map(p => p.valor), borderColor: "#4ade80",
        backgroundColor: "rgba(74,222,128,.15)", fill: true, tension: 0.25, pointRadius: 3 }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#cfd6dd" } } },
      scales: { x: { ticks: { color: "#9aa4af", maxTicksLimit: 12 }, grid: { color: "#20262e" } },
                y: { ticks: { color: "#9aa4af" }, grid: { color: "#20262e" } } } },
  });
}
document.getElementById("cerrar-grafico").onclick = function () {
  document.getElementById("panel-grafico").style.display = "none";
};
// ---------- GOES tiempo real ----------
let capasGoes = {};
document.getElementById("btn-goes").addEventListener("click", cargarGoes);
async function cargarGoes() {
  document.getElementById("estado-goes").textContent = "Buscando la ultima imagen GOES-19...";
  try {
    const r = await fetch("/.netlify/functions/goes");
    const d = await r.json();
    if (!r.ok || d.error) throw new Error(d.error || ("error " + r.status));
    document.getElementById("estado-goes").textContent = "Imagen del " + d.fecha_imagen + " - tocar de nuevo para refrescar";
    const defs = [["nubes", "Nubes (tope frio)", "#e2e8f0", 0.7], ["severo", "Conveccion severa (granizo?)", "#f43f5e", 0.85]];
    const cont = document.getElementById("grupo-goes");
    cont.innerHTML = "";
    defs.forEach(function (def) {
      const clave = def[0];
      const habia = capasGoes[clave];
      if (habia && habia.capa) mapa.removeLayer(habia.capa);
      const capa = L.tileLayer(d.tiles[clave], { opacity: def[3], maxZoom: 12 });
      capasGoes[clave] = { capa: capa, visible: false };
      const btn = document.createElement("button");
      btn.className = "capa-btn";
      const pt = document.createElement("span");
      pt.className = "punto"; pt.style.background = def[2];
      btn.appendChild(pt);
      btn.appendChild(document.createTextNode(def[1]));
      btn.onclick = function () {
        const o = capasGoes[clave];
        o.visible = !o.visible;
        if (o.visible) { o.capa.addTo(mapa); } else { mapa.removeLayer(o.capa); }
        btn.classList.toggle("activa", o.visible);
      };
      cont.appendChild(btn);
      const auto = habia ? habia.visible : (clave === "nubes");
      if (auto) btn.click();
    });
  } catch (err) {
    document.getElementById("estado-goes").textContent = "Error: " + err.message;
  }
}
cargarConfig();
</script>
</body>
</html>
